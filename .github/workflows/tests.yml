name: Tests

# Runs the full suite on every PR (and on manual dispatch) and posts a single,
# self-updating results comment on the PR. Every check the repo has is run here —
# type-check, production build, gold-price parser tests, and the real OCR pipeline
# tests (tesseract.js over the committed screenshot fixtures). Nothing here touches
# app logic; it only reports.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Only keep the latest run per PR branch alive.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Each check runs regardless of earlier failures so the comment reports
      # the full picture in one pass. Output is teed to a log file; the exit
      # code is remembered per check and the job fails at the end if any failed.
      - name: Run all checks
        id: checks
        run: |
          set +e
          mkdir -p .ci
          overall=0

          run() {
            local key="$1"; local label="$2"; shift 2
            echo "::group::$label"
            "$@" 2>&1 | tee ".ci/$key.log"
            local code=${PIPESTATUS[0]}
            echo "::endgroup::"
            echo "$code" > ".ci/$key.code"
            if [ "$code" -ne 0 ]; then overall=1; fi
          }

          run tsc     "Type-check (tsc --noEmit)"      npx tsc --noEmit
          run build   "Production build (next build)"  npm run build
          run gold    "Gold-price tests (test:gold)"   npm run test:gold
          run ocr     "OCR pipeline tests (test:ocr)"  npm run test:ocr

          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build results comment
        if: always()
        run: node .github/workflows/build-report.mjs

      - name: Post results comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.ci/report.md', 'utf8');
            const marker = '<!-- test-results-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail job if any check failed
        if: always()
        run: exit ${{ steps.checks.outputs.overall }}
